services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: knetraai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vision_ai}
      POSTGRES_USER: ${POSTGRES_USER:-vision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vision}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vision} -d ${POSTGRES_DB:-vision_ai}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: knetraai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: knetraai-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://vision:vision@postgres:5432/vision_ai}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8001}
      STORAGE_DIR: /data
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ai-service:
    build: ./ai-service
    container_name: knetraai-service
    restart: unless-stopped
    env_file: .env
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      STORAGE_DIR: /data
      ORT_LOG_SEVERITY_LEVEL: ${ORT_LOG_SEVERITY_LEVEL:-3}
    ports:
      - "8001:8001"
    volumes:
      - ./storage:/data
    depends_on:
      backend:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: knetraai-frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
