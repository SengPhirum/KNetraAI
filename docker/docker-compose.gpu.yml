# Optional override for NVIDIA GPU inference hosts.
# Usage:
# docker compose --env-file docker/.env.production -f docker/docker-compose.yml -f docker/docker-compose.gpu.yml up -d --build
services:
  ai-service:
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-insightface}
      INSIGHTFACE_PROVIDERS: ${INSIGHTFACE_PROVIDERS:-CUDAExecutionProvider,CPUExecutionProvider}
      INSIGHTFACE_CTX_ID: ${INSIGHTFACE_CTX_ID:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
