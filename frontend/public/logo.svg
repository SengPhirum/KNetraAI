<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E90FF"/>
      <stop offset="1" stop-color="#0B3D91"/>
    </linearGradient>
    <radialGradient id="iris" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- eye outline (netra) -->
  <path d="M76 256 C 150 138 362 138 436 256 C 362 374 150 374 76 256 Z"
        fill="rgba(255,255,255,0.10)" stroke="#ffffff" stroke-width="20" stroke-linejoin="round"/>
  <!-- aperture ticks -->
  <g stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.85">
    <line x1="256" y1="118" x2="256" y2="146"/>
    <line x1="256" y1="366" x2="256" y2="394"/>
  </g>
  <!-- iris -->
  <circle cx="256" cy="256" r="92" fill="url(#iris)"/>
  <circle cx="256" cy="256" r="92" fill="none" stroke="#ffffff" stroke-width="10"/>
  <!-- K monogram -->
  <g stroke="#0B3D91" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="228" y1="206" x2="228" y2="306"/>
    <path d="M292 206 L 236 256 L 292 306"/>
  </g>
  <!-- AI spark -->
  <circle cx="352" cy="176" r="14" fill="#7FDBFF"/>
</svg>
